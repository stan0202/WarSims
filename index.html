<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRPG Auto Battler</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div class="bg-overlay"></div>
        
        <!-- 右上角設定與數據按鈕 -->
        <div class="top-controls">
            <button id="btn-toggle-log" class="icon-btn" title="戰鬥日誌">📜</button>
            <button id="btn-stats" class="icon-btn" title="數值調整">📊</button>
            <button id="btn-settings" class="icon-btn" title="設定">⚙️</button>
        </div>

        <!-- 設定彈出視窗 (Modal) -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <h2 data-i18n="settings_title">⚙️ 遊戲設定</h2>
                
                <div class="setting-group">
                    <label data-i18n="setting_language">語言 (Language)</label>
                    <select id="lang-select" onchange="switchLanguage(this.value)">
                        <option value="zh-TW">繁體中文</option>
                        <option value="en">English</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label data-i18n="setting_speed">戰鬥速度</label>
                    <select id="speed-select">
                        <option value="0.5">0.5X</option>
                        <option value="1" selected>1X</option>
                        <option value="2">2X</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label data-i18n="setting_bgm">音樂音量</label>
                    <div class="slider-row">
                        <input type="range" id="vol-bgm" min="0" max="1" step="0.05" value="0.25">
                        <button id="toggle-bgm" class="icon-btn">🎵</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label data-i18n="setting_sfx">音效音量</label>
                    <div class="slider-row">
                        <input type="range" id="vol-sfx" min="0" max="1" step="0.05" value="0.25">
                        <button id="toggle-sfx" class="icon-btn">🔊</button>
                    </div>
                </div>

                <button id="btn-close-settings" class="primary" data-i18n="btn_close">關閉</button>
            </div>
        </div>

        <!-- 數值調整彈出視窗 (Modal) -->
        <div id="stats-modal" class="modal hidden">
            <div class="modal-content stats-modal-content">
                <h2 data-i18n="stats_title">📊 數值調整 (測試用)</h2>
                
                <div id="stats-form-container" class="stats-form-container">
                    <!-- 由 JavaScript 動態生成表單 -->
                </div>

                <div class="modal-buttons">
                    <button id="btn-cancel-stats" data-i18n="btn_cancel_stats">取消</button>
                    <button id="btn-save-stats" class="primary" data-i18n="btn_save_stats">💾 保存設定</button>
                </div>
            </div>
        </div>

        <header>
            <h1 class="title" data-i18n="title">聖焰與暗影的交鋒</h1>
            <div class="controls">
                <label><span data-i18n-text="max_chars_label">上場人數 (2~5): </span><input type="number" id="num-chars" value="2" min="2" max="5"></label>
                <button id="btn-random" data-i18n="btn_random">🎲 一鍵隨機佈陣</button>
                <button id="btn-start" class="primary" disabled data-i18n="btn_start">⚔️ 開始戰鬥</button>
                <button id="btn-reset" class="hidden" data-i18n="btn_reset">🔄 重置下一局</button>
            </div>
            
            <!-- 克制說明圖 -->
            <div class="element-legend">
                <span data-i18n="legend_warrior">🛡️ 戰士 剋 ⚔️ 刺客</span>
                <span class="arrow">➔</span>
                <span data-i18n="legend_assassin">⚔️ 刺客 剋 🏹 弓手</span>
                <span class="arrow">➔</span>
                <span data-i18n="legend_archer">🏹 弓手 剋 🛡️ 戰士</span>
            </div>
            <div class="element-legend tiebreaker-legend" style="margin-top: 8px; font-size: 0.9em; opacity: 0.9;">
                <span data-i18n="legend_tiebreaker">⏱️ 同時攻擊時，雙方陣營將輪流取得先手優勢</span>
            </div>
        </header>

        <main class="battlefield">
            <div class="team-area team1">
                <h2 class="team-name" data-i18n="team1_name">玩家 1 (光之陣營)</h2>
                <div class="grid" id="grid-team1">
                    <!-- 3x3 cells generated by JS -->
                </div>
            </div>

            <div class="vs-badge">VS</div>

            <div class="team-area team2">
                <h2 class="team-name" data-i18n="team2_name">玩家 2 (闇之陣營)</h2>
                <div class="grid" id="grid-team2">
                    <!-- 3x3 cells generated by JS -->
                </div>
            </div>
        </main>

        <section class="selection-panel" id="selection-panel">
            <h3 data-i18n="instruction">請將下方角色「拖曳」至棋盤空格，或是點擊後再點擊棋盤</h3>
            <div class="character-pool" id="character-pool-container">
                <!-- 角色卡片會由 characters.js 動態生成 -->
            </div>
            <div id="selection-status"><span data-i18n-text="selection_status">目前選擇：</span><span data-i18n-text="selection_none">無</span></div>
        </section>

        <section id="battle-log-sidebar" class="battle-log sidebar hidden-sidebar">
            <h3 data-i18n="battle_log_title">📜 戰鬥日誌</h3>
            <div id="log-content"></div>
        </section>
    </div>

    <!-- 實體音效標籤 -->
    <audio id="bgm-audio" loop src="assets/audio/bgm.mp3"></audio>
    <audio id="hit-audio" src="assets/audio/hit.mp3"></audio>
    <audio id="crit-audio" src="assets/audio/crit.mp3"></audio>
    <audio id="die-audio" src="assets/audio/die.mp3"></audio>
    <audio id="magic-audio" src="assets/audio/magic.mp3"></audio>

    <script src="assets/data/i18n.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
