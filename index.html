<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRPG Auto Battler</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div class="bg-overlay"></div>
        
        <!-- 設定視窗 (Modal) -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <h2 data-i18n="settings_title">⚙️ 遊戲設定</h2>
                
                <div class="setting-group">
                    <label data-i18n="setting_language">語言 (Language)</label>
                    <select id="select-lang">
                        <option value="zh-TW">繁體中文</option>
                        <option value="en">English</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label data-i18n="setting_speed">戰鬥速度</label>
                    <select id="select-speed">
                        <option value="0.5">0.5X</option>
                        <option value="1" selected>1X</option>
                        <option value="2">2X</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label data-i18n="setting_bgm">音樂音量 (BGM)</label>
                    <div class="slider-container">
                        <input type="range" id="vol-bgm" min="0" max="1" step="0.05" value="0.25">
                        <span id="val-bgm">25%</span>
                    </div>
                </div>

                <div class="setting-group">
                    <label data-i18n="setting_sfx">音效音量 (SFX)</label>
                    <div class="slider-container">
                        <input type="range" id="vol-sfx" min="0" max="1" step="0.05" value="0.25">
                        <span id="val-sfx">25%</span>
                    </div>
                </div>

                <button id="btn-close-settings" class="primary" data-i18n="btn_close">關閉</button>
            </div>
        </div>

        <header>
            <h1 class="title" data-i18n="title">聖焰與暗影的交鋒</h1>
            
            <div class="controls-wrapper">
                <div class="controls">
                    <label><span data-i18n="num_chars_label">上場人數 (2~5):</span> <input type="number" id="num-chars" value="2" min="2" max="5"></label>
                    <button id="btn-random" data-i18n="btn_random">🎲 一鍵隨機佈陣</button>
                    <button id="btn-start" class="primary" disabled data-i18n="btn_start">⚔️ 開始戰鬥</button>
                    <button id="btn-reset" class="hidden" data-i18n="btn_reset">🔄 重置下一局</button>
                    <button id="btn-settings" data-i18n="btn_settings">⚙️ 設定</button>
                </div>
            </div>
            
            <!-- 克制說明圖 -->
            <div class="element-legend">
                <span data-i18n="legend_warrior">🛡️ 戰士 剋 ⚔️ 刺客</span>
                <span class="arrow">➔</span>
                <span data-i18n="legend_assassin">⚔️ 刺客 剋 🏹 弓手</span>
                <span class="arrow">➔</span>
                <span data-i18n="legend_archer">🏹 弓手 剋 🛡️ 戰士</span>
            </div>
        </header>

        <main class="battlefield">
            <div class="team-area team1">
                <h2 class="team-name" data-i18n="team1_name">玩家 1 (光之陣營)</h2>
                <div class="grid" id="grid-team1">
                    <!-- 3x3 cells generated by JS -->
                </div>
            </div>

            <div class="vs-badge">VS</div>

            <div class="team-area team2">
                <h2 class="team-name" data-i18n="team2_name">玩家 2 (闇之陣營)</h2>
                <div class="grid" id="grid-team2">
                    <!-- 3x3 cells generated by JS -->
                </div>
            </div>
        </main>

        <section class="selection-panel" id="selection-panel">
            <h3 data-i18n="instruction_drag">請將下方角色「拖曳」至棋盤空格，或是點擊後再點擊棋盤</h3>
            <div class="character-pool" id="character-pool">
                <!-- 生成由 JS 控制的卡片 -->
            </div>
            <div id="selection-status-wrap"><span data-i18n="status_selected">目前選擇：</span><span id="selection-status" data-i18n="status_none">無</span></div>
        </section>

        <section class="battle-log">
            <h3 data-i18n="log_title">📜 戰鬥日誌</h3>
            <div id="log-content"></div>
        </section>
    </div>

    <!-- 實體音效標籤 (請將您自己的 MP3 檔案放入資料夾中，並命名如下) -->
    <audio id="bgm-audio" loop src="./bgm.mp3"></audio>
    <audio id="hit-audio" src="./hit.mp3"></audio>
    <audio id="crit-audio" src="./crit.mp3"></audio>
    <audio id="die-audio" src="./die.mp3"></audio>

    <script src="lang.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
