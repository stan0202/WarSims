<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRPG Auto Battler</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div class="bg-overlay"></div>
        
        <!-- 音效與音樂控制面板 -->
        <div class="audio-settings">
            <h4>⚙️ 音訊設定</h4>
            <div class="setting-row">
                <label>音樂</label>
                <input type="range" id="vol-bgm" min="0" max="1" step="0.05" value="0.25">
                <button id="toggle-bgm" class="icon-btn">🎵</button>
            </div>
            <div class="setting-row">
                <label>音效</label>
                <input type="range" id="vol-sfx" min="0" max="1" step="0.05" value="0.25">
                <button id="toggle-sfx" class="icon-btn">🔊</button>
            </div>
        </div>

        <header>
            <h1 class="title">聖焰與暗影的交鋒</h1>
            <div class="controls">
                <label>上場人數 (2~5): <input type="number" id="num-chars" value="2" min="2" max="5"></label>
                <button id="btn-random">🎲 一鍵隨機佈陣</button>
                <button id="btn-start" class="primary" disabled>⚔️ 開始戰鬥</button>
                <button id="btn-reset" class="hidden">🔄 重置下一局</button>
                <button id="btn-export">💾 匯出戰鬥紀錄</button>
            </div>
            
            <!-- 克制說明圖 -->
            <div class="element-legend">
                <span>🛡️ 戰士 剋 ⚔️ 刺客</span>
                <span class="arrow">➔</span>
                <span>⚔️ 刺客 剋 🏹 弓手</span>
                <span class="arrow">➔</span>
                <span>🏹 弓手 剋 🛡️ 戰士</span>
            </div>
        </header>

        <main class="battlefield">
            <div class="team-area team1">
                <h2 class="team-name">玩家 1 (光之陣營)</h2>
                <div class="grid" id="grid-team1">
                    <!-- 3x3 cells generated by JS -->
                </div>
            </div>

            <div class="vs-badge">VS</div>

            <div class="team-area team2">
                <h2 class="team-name">玩家 2 (闇之陣營)</h2>
                <div class="grid" id="grid-team2">
                    <!-- 3x3 cells generated by JS -->
                </div>
            </div>
        </main>

        <section class="selection-panel" id="selection-panel">
            <h3>請將下方角色「拖曳」至棋盤空格，或是點擊後再點擊棋盤</h3>
            <div class="character-pool" id="character-pool-container">
                <!-- 角色卡片會由 characters.js 動態生成 -->
            </div>
            <div id="selection-status">目前選擇：無</div>
        </section>

        <section class="battle-log">
            <h3>📜 戰鬥日誌</h3>
            <div id="log-content"></div>
        </section>
    </div>

    <!-- 實體音效標籤 -->
    <audio id="bgm-audio" loop src="assets/audio/bgm.mp3"></audio>
    <audio id="hit-audio" src="assets/audio/hit.mp3"></audio>
    <audio id="crit-audio" src="assets/audio/crit.mp3"></audio>
    <audio id="die-audio" src="assets/audio/die.mp3"></audio>
    <audio id="magic-audio" src="assets/audio/magic.mp3"></audio>

    <script src="assets/data/characters.js"></script>
    <script src="app.js"></script>
</body>
</html>
